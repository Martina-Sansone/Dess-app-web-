<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tienda Online</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <nav>
        <div class="logo">LUXURY STORE ADMIN</div>
        <div class="nav-links">
            <a href="index.html">Ver Tienda</a>
        </div>
    </nav>

    <div class="container animate">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Gestión de Productos</h1>
            <button class="btn btn-primary" id="btn-add-product">Nuevo Producto</button>
        </header>

        <section class="card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="product-list-body">
                    <!-- Products will be injected here -->
                </tbody>
            </table>
        </section>
    </div>

    <!-- Modal for Add/Edit Product -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal">
            <h2 id="modal-title">Agregar Producto</h2>
            <form id="product-form" style="margin-top: 1.5rem;">
                <input type="hidden" id="product-id">
                
                <div class="form-group">
                    <label for="name">Nombre del Producto</label>
                    <input type="text" id="name" required placeholder="Ej: Reloj Elegante">
                </div>

                <div class="form-group">
                    <label for="price">Precio ($)</label>
                    <input type="number" id="price" required step="0.01" placeholder="99.99">
                </div>

                <div class="form-group">
                    <label for="category">Categoría</label>
                    <select id="category" required>
                        <option value="Electro">Electrónica</option>
                        <option value="Moda">Moda</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">URL de la Imagen</label>
                    <input type="url" id="image" required placeholder="https://ejemplo.com/imagen.jpg">
                </div>

                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" rows="3" placeholder="Breve descripción del producto..."></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                    <button type="button" class="btn btn-secondary" id="btn-close-modal" style="flex: 1;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="scripts/init.js"></script>
    <script type="module" src="scripts/admin.js"></script>
</body>
</html>
